<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Giriş Yap</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #f4f7f6; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Giriş Paneli</h2>
    <input type="email" id="mail" placeholder="E-posta">
    <input type="password" id="sifre" placeholder="Şifre">
    <button onclick="girisYap()">Giriş Yap</button>
</div>

<script>
    async function girisYap() {
        const data = { mail: document.getElementById('mail').value, sifre: document.getElementById('sifre').value };
        const res = await fetch('https://isu-abys.onrender.com', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (res.ok) {
            localStorage.setItem("giris", "true"); // Giriş durumunu hafızaya al
            window.location.href = "index.html";
        } else {
            alert("Hatalı mail veya şifre!");
        }
    }
</script>
</body>
</html>
